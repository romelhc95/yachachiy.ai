version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: amauta_db
    environment:
      POSTGRES_DB: amauta_db
      POSTGRES_USER: user_amauta
      POSTGRES_PASSWORD: password_amauta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  harvester:
    build: .
    container_name: amauta_harvester
    environment:
      DATABASE_URL: postgresql://user_amauta:password_amauta@db:5432/amauta_db
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
